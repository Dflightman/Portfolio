# =============================================
#  GITHUB ACTIONS CI/CD PIPELINE
#  Runs automatically on every push to main
#  Deploys frontend to GitHub Pages
# =============================================

name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── JOB 1: Test & Lint ────────────────────
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: ✅ Check HTML file exists
        run: |
          if [ -f "index.html" ]; then
            echo "✓ index.html found"
          else
            echo "✗ index.html NOT found!" && exit 1
          fi

      - name: ✅ Check CSS file exists
        run: |
          if [ -f "styles.css" ]; then
            echo "✓ styles.css found"
          else
            echo "✗ styles.css NOT found!" && exit 1
          fi

      - name: ✅ Check JavaScript file exists
        run: |
          if [ -f "script.js" ]; then
            echo "✓ script.js found"
          else
            echo "✗ script.js NOT found!" && exit 1
          fi

      - name: ✅ Validate backend server file
        run: |
          if [ -f "backend/server.js" ]; then
            echo "✓ backend/server.js found"
          else
            echo "✗ backend/server.js NOT found!" && exit 1
          fi

      - name: 🔍 Node.js syntax check
        working-directory: ./backend
        run: node --check server.js && echo "✓ No syntax errors in server.js"

  # ── JOB 2: Deploy to GitHub Pages ────────
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test   # Only deploy if tests pass!

    # Only deploy on pushes to main (not on pull requests)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📁 Upload frontend files
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload only frontend files (not backend folder)
          path: "."

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 🎉 Deployment success
        run: echo "✓ Site deployed! Check your GitHub Pages URL."
